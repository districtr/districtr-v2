repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: prettier
        name: Run Prettier
        entry: bash -c "cd app && bunx prettier --write \"src/**/*.{ts,tsx}\" --config .prettierrc.js"
        language: system
        pass_filenames: false
