repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: prettier
        name: Run Prettier
        # Only format the files staged by pre-commit (diff-driven). The old
        # `pass_filenames: false` + `src/**/*.{ts,tsx}` sweep re-formatted the
        # entire app on every hook run and defeated pre-commit's design.
        # Requires `bun install` to have been run under ./app at least once.
        entry: app/node_modules/.bin/prettier --write --config app/.prettierrc.js
        language: system
        files: ^app/src/.*\.(ts|tsx)$
