name: Fly Deploy Districtr V2 CMS
on:
  push:
    branches:
      - main
      - dev
    paths:
      - "cms/**"
      - ".github/workflows/fly-deploy-cms.yml"
jobs:
  deploy:
    name: Deploy CMS
    runs-on: ubuntu-latest
    concurrency: deploy-cms-${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v3
      - name: Set deploy env
        id: deploy-env
        run: |
          if [ "${{ github.ref_name }}" = "dev" ]; then
            echo "app_name=districtr-v2-cms-dev" >> $GITHUB_OUTPUT
          else
            echo "app_name=districtr-v2-cms" >> $GITHUB_OUTPUT
          fi
      - uses: superfly/flyctl-actions/setup-flyctl@1.5
      - name: Deploy (dev)
        if: github.ref_name == 'dev'
        run: flyctl deploy --remote-only --app ${{ steps.deploy-env.outputs.app_name }}
        working-directory: cms
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_DEV_TOKEN }}
      - name: Deploy (main)
        if: github.ref_name != 'dev'
        run: flyctl deploy --remote-only --app ${{ steps.deploy-env.outputs.app_name }}
        working-directory: cms
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
