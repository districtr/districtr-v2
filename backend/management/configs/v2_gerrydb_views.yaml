# GerryDB view import list for the v2 layer generation: 52 geographies
# (50 states + DC + PR), two layers each — a shatter parent and a block
# child. Source geopackages live on S3 under `gerrydb/`, named
# `{geo}_districtr_{layer}_view_v2.gpkg`.
#
# The parent layer is `vtd` except for ca, hi, or, wv, whose v2 sources
# have no vtd layer; they use `bg`.
#
# v2 source data splits discontiguous VTDs into contiguous parts with
# `-datadem-N` suffixed geo_ids; all v2 VTD geometries are single-part.
#
# Layers imported here are referenced by v2_backend_config.yml and
# v2_custom_districts_config.yml. Loaded with
# `python cli.py batch-create-districtr-maps`.
gerrydb_views:
- gpkg: al_districtr_vtd_view_v2.gpkg
  layer: al_districtr_vtd_view_v2
  table_name: al_districtr_vtd_view_v2
