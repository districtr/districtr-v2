# Flexible (custom) district maps — one per v2 geography (52: 50 states
# + DC + PR). These reuse the v2 gerrydb layers and set
# num_districts_modifiable: true, so the district count is not fixed to a
# legislative body's size and can be changed after creation (e.g. by CSV
# assignment import). num_districts is the default and minimum count:
# each geography's congressional-district count, or 2 — the app's
# minimum — for geographies with no congressional map (at-large states,
# DC, and PR).
#
# gerrydb_views and shatterable_views are omitted: the layers are
# imported by v2_gerrydb_views.yaml and the shatterable views are created
# by v2_backend_config.yml. The `custom` map group is created by the
# loader from map_group_definitions.
districtr_maps:
- child_layer: al_districtr_block_view_v2
  districtr_map_slug: al_custom_districts_v2
  gerrydb_table_name: al_districtr_view_v2
  name: AL Districts
  num_districts: 7
  num_districts_modifiable: true
  parent_layer: al_districtr_vtd_view_v2
  tiles_s3_path: tilesets/al_districtr_view_v2.pmtiles
