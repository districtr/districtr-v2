# --- Custom (flexible) district maps ---

# Flexible (custom) district maps — one per v2 geography (52: 50 states
# + DC + PR). These reuse the v2 gerrydb layers and set
# num_districts_modifiable: true, so the district count is not fixed to a
# legislative body's size and can be changed after creation (e.g. by CSV
# assignment import). num_districts is the default and minimum count:
# each geography's congressional-district count, or 2 — the app's
# minimum — for geographies with no congressional map (at-large states,
# DC, and PR).
