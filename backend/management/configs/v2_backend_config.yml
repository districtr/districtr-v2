# v2 map modules — STEP 2 of 2 (after v2_gerrydb_views.yaml has been imported).
#
# 146 districtr_maps: 3 per state mirroring v1's per-state module set and
# district counts exactly (congressional/state-senate/state-house, or the
# at-large-state subset — see v1_backend_config.yml), 1 for DC, 2 for PR.
# All slugs carry a `_v2` suffix; names are unchanged from v1 (they name
# real-world legislative bodies, not the data vintage). ca/hi/or/wv use the
# `bg` layer as shatter parent (no v2 vtd source), same as v1.
#
# ## Review required: DC and PR module counts (no v1 precedent)
#
# DC (1 module — no congressional map, no state senate/house):
#   - DC has no voting House seat; the at-large, non-voting Delegate is not
#     redistricted. (Ballotpedia: DC's At-Large Congressional District)
#   - `dc_council_wards_v2`: 8 districts, one per DC Council ward. The
#     DC Council has 13 seats total (8 ward + 4 at-large + chair at-large,
#     DC Code Sec. 1-204.01) but only the 8 ward seats are geographically
#     districted, so num_districts = 8.
#   - Not modeled: the DC State Board of Education (8 single-member
#     districts + 1 at-large) reuses the same ward boundaries as the
#     Council, so it would be a duplicate map on identical geometry —
#     flagging in case a reviewer wants it as a separate module anyway.
#   - Not modeled: Advisory Neighborhood Commissions (~296 single-member
#     districts) — too granular for this tool's scope.
#
# PR (2 modules — no congressional map):
#   - PR's House seat is a single, at-large, non-voting Resident
#     Commissioner (4-year term) — not redistricted, same reasoning as DC.
#     (Wikipedia: Resident Commissioner of Puerto Rico)
#   - `pr_senate_districts_v2`: 8 districts. PR Senate has 27 seats: 16 from
#     8 senatorial districts (2 senators/district) + 11 at-large. The
#     *districted* count is 8, so num_districts = 8 (a district here elects
#     2 senators, unlike the single-member "districts" elsewhere in this
#     config — flag for reviewer, since num_districts semantics may need to
#     mean something different for this module).
#   - `pr_house_districts_v2`: 40 districts. PR House has 51 seats: 40 from
#     single-member representative districts + 11 at-large. num_districts = 40.
#   - Sources: Wikipedia "Legislative Assembly of Puerto Rico", "Senate of
#     Puerto Rico", "House of Representatives of Puerto Rico"; Ballotpedia
#     "Puerto Rico Legislative Assembly".
#   - HUMAN VERIFICATION NEEDED: these are 2026 civics-reference figures,
#     not sourced from the v2 gerrydb geometries themselves. Confirm the
#     imported pr_districtr_vtd_view_v2 geometry actually carries 8/40
#     district identifiers before wiring these counts in for real.
#
# map_groups: v2 modules are added to the SAME `states` group v1 modules
# use, so they appear in the FE picker (GET /api/gerrydb/views?group=states,
# see backend/app/main.py get_projects()) immediately once loaded and
# `visible=true` (the DistrictrMap default) — no FE change needed. This is
# intentional: it lets v1 and v2 coexist in the picker during verification.
#
# ---------------------------------------------------------------------------
# RETIREMENT OF v1 (separate, explicit, run only after v2 is loaded and
# verified — NOT part of loading this config):
#
# The picker (`GET /api/gerrydb/views`) filters on `DistrictrMap.visible`
# (backend/app/main.py get_projects(), around line 1602). Existing Documents
# referencing v1 districtr_map_slugs are looked up directly by slug
# (e.g. PUT /api/document, GET /api/document/{id}) and do NOT filter on
# `visible`, so setting v1 rows invisible hides them from the picker only —
