# Map modules for the v2 layer generation: 52 geographies (50 states +
# DC + PR). Slugs carry a `_v2` suffix; names refer to the real-world
# legislative bodies they redistrict. Each geography gets one module per
# geographically districted body: congressional, state senate, and state
# house for most states; at-large states have no congressional module.
#
# DC has a single module, dc_council_wards_v2 (8 districts): DC's House
# seat is a non-voting at-large Delegate and is not redistricted. Of the
# DC Council's 13 seats, only the 8 ward seats are geographically
# districted (DC Code Sec. 1-204.01). The State Board of Education's 8
# districts share the ward boundaries (a module for it would duplicate
# this one's geometry), and Advisory Neighborhood Commissions (~296
# single-member districts) sit below this tool's granularity.
#
# PR has two modules; its House seat is a single at-large non-voting
# Resident Commissioner and is not redistricted.
#   - pr_senate_districts_v2 (8): the PR Senate has 27 seats — 16 elected
#     from 8 senatorial districts (two senators per district) plus 11
#     at-large. num_districts counts the 8 drawn districts; note each
#     elects two members, unlike the single-member districts elsewhere in
#     this config.
#   - pr_house_districts_v2 (40): the PR House has 51 seats — 40
#     single-member representative districts plus 11 at-large.
#
# All modules join the `states` map group. The views listing
# (GET /api/gerrydb/views, get_projects() in backend/app/main.py) returns
# the maps of a group with visible = true, so a module appears in the
# frontend picker once loaded; setting visible = false removes it from
# the picker without affecting documents that reference it (see the
# `visible` field in backend/app/models.py).
#
# Layers referenced here are imported by v2_gerrydb_views.yaml. The
# loader creates any map group missing from the database using
# map_group_definitions; a group without a definition gets a title-cased
# slug as its name.
shatterable_views:
- child_layer: al_districtr_block_view_v2
  districtr_map_slug: al_districtr_view_v2
  gerrydb_table_name: al_districtr_view_v2
  parent_layer: al_districtr_vtd_view_v2
