# Map modules for the v2 layer generation: 52 geographies (50 states +
# DC + PR). Slugs carry a `_v2` suffix; names refer to the real-world
# legislative bodies they redistrict. Each geography gets one module per
# geographically districted body: congressional, state senate, and state
# house for most states; at-large states have no congressional module.
#
# All modules join the `states` map group. The views listing
# (GET /api/gerrydb/views, get_projects() in backend/app/main.py) returns
# the maps of a group with visible = true, so a module appears in the
# frontend picker once loaded; setting visible = false removes it from
# the picker without affecting documents that reference it (see the
# `visible` field in backend/app/models.py).
#
# Layers referenced by the map modules are imported by this file's
# gerrydb_views section. The loader creates any map group missing from the database using
# map_group_definitions; a group without a definition gets a title-cased
# slug as its name.

# GerryDB view import list for the v2 layer generation: 52 geographies
# (50 states + DC + PR), two layers each — a shatter parent and a block
# child. Source geopackages live on S3 under `gerrydb/`, named
# `{geo}_districtr_{layer}_view_v2.gpkg`.
#
# The parent layer is `vtd` except for ca, hi, or, wv (whose v2 sources
# have no vtd layer) and me (whose vtd layer does not cover the
# unorganized territories, leaving most blocks there without a parent);
# these use `bg`.
#
# v2 source data splits discontiguous VTDs into contiguous parts with
# `-datadem-N` suffixed geo_ids; all v2 VTD geometries are single-part.
#
# Loaded with `python cli.py batch-create-districtr-maps`; reruns can
# pass --skip-gerrydb-loads to skip the (slow, networked) imports while
# reprocessing the metadata sections.

