# fly.toml app configuration file generated for districtr-v2-api on 2024-07-20T10:05:11-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'districtr-v2-api'
primary_region = 'ewr'

[env]
  BACKEND_CORS_ORIGINS = 'http://localhost:3000'
  DOMAIN = 'http://localhost'
  ENVIRONMENT = 'production'
  PROJECT_NAME = 'Districtr v2 backend'
  R2_BUCKET_NAME = 'districtr-v2-dev'
  VOLUME_PATH = '/data'
  # Uvicorn worker count (read by uvicorn when --workers is not passed). The machine is
  # shared-cpu-4x/8gb; lower this to 2-3 if per-worker RSS (graph LRU caches, see
  # /_debug/cache) pushes total memory too high.
  WEB_CONCURRENCY = '4'
  # Aggregate prometheus metrics across workers; without this, /metrics scrapes return
  # counters from whichever worker answers. Dir is created in the Dockerfile.
  PROMETHEUS_MULTIPROC_DIR = '/tmp/prometheus_multiproc'

[[mounts]]
  source = 'gerrydb_views'
  destination = '/data'
  initial_size = '10gb'
  processes = ['app']

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  # Without an explicit block, Fly defaults to ~25 concurrent *connections* per machine,
  # which throttles at the proxy long before uvicorn (4 workers x 40-thread pools) is
  # saturated. Soft limit steers load balancing; hard limit queues/rejects beyond it.
  [http_service.concurrency]
    type = "requests"
    soft_limit = 100
    hard_limit = 150

[metrics]
  port = 8080
  path = "/metrics"

[[vm]]
  memory = '8gb'
  cpu_kind = 'shared'
  cpus = 4

[deploy]
  release_command = "alembic upgrade head"
