# fly.toml app configuration file generated for districtr-v2-api on 2024-07-20T10:05:11-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'districtr-v2-api'
primary_region = 'ewr'

[env]
  BACKEND_CORS_ORIGINS = 'http://localhost:3000'
  DOMAIN = 'http://localhost'
  ENVIRONMENT = 'production'
  PROJECT_NAME = 'Districtr v2 backend'
  R2_BUCKET_NAME = 'districtr-v2-dev'
  VOLUME_PATH = '/data'

[[mounts]]
  source = 'gerrydb_views'
  destination = '/data'
  initial_size = '10gb'
  processes = ['app']

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[metrics]
  port = 8080
  path = "/metrics"

[[vm]]
  memory = '8gb'
  cpu_kind = 'shared'
  cpus = 4

[deploy]
  release_command = "sh -c 'for i in $(seq 1 12); do python3 /app/scripts/wait_for_db.py && alembic upgrade head && exit 0; echo \"DB not ready, retry $i/12...\"; sleep 15; done; exit 1'"
